    <script>
        // ===================== Utilities =====================
        function rng(seed) {
            let s = (seed >>> 0) || 1;
            const next = () => {
                s = (s + 0x6D2B79F5) | 0;
                let t = Math.imul(s ^ (s >>> 15), 1 | s);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
            const gauss = () => (next() + next() + next() + next() - 2) / 2;
            return { next, gauss };
        }

        const TARGETS = {
            sin: x => Math.sin(Math.PI * x),
            x2: x => x * x,
            x3: x => x * x * x,
        };
        const MODEL_NAMES = ['constant', 'linear', 'quadratic', 'cubic'];
        const COLORS = {
            target: '#6BA38C',
            fit: '#5B8FB9',
            data: '#E07A5F',
            ein: '#5B8FB9',
            eout: '#E07A5F',
            simple: '#5B8FB9',
            complex: '#B07AAE',
            bias: '#E07A5F',
            var: '#5B8FB9',
            avg: '#5B8FB9',
        };

        const KATEX_OPTS = {
            delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false },
            ],
            throwOnError: false,
        };

        function renderMath(el) {
            if (window.renderMathInElement) {
                try { renderMathInElement(el, KATEX_OPTS); } catch (e) {}
            }
        }

        function polyFit(points, degree) {
            const m = degree + 1;
            const XtX = Array.from({ length: m }, () => Array(m).fill(0));
            const Xty = Array(m).fill(0);
            for (const p of points) {
                const phi = []; let v = 1;
                for (let j = 0; j < m; j++) { phi.push(v); v *= p.x; }
                for (let a = 0; a < m; a++) {
                    Xty[a] += phi[a] * p.y;
                    for (let c = 0; c < m; c++) XtX[a][c] += phi[a] * phi[c];
                }
            }
            for (let j = 0; j < m; j++) XtX[j][j] += 1e-9;
            const w = solve(XtX, Xty);
            const predict = x => { let v = 1, s = 0; for (let j = 0; j < w.length; j++) { s += w[j] * v; v *= x; } return s; };
            return { weights: w, predict };
        }

        function solve(A, b) {
            const n = A.length;
            for (let i = 0; i < n; i++) {
                let max = i;
                for (let k = i + 1; k < n; k++) if (Math.abs(A[k][i]) > Math.abs(A[max][i])) max = k;
                [A[i], A[max]] = [A[max], A[i]];
                [b[i], b[max]] = [b[max], b[i]];
                for (let k = i + 1; k < n; k++) {
                    const f = A[k][i] / A[i][i];
                    for (let j = i; j < n; j++) A[k][j] -= f * A[i][j];
                    b[k] -= f * b[i];
                }
            }
            const x = Array(n).fill(0);
            for (let i = n - 1; i >= 0; i--) {
                let s = b[i];
                for (let j = i + 1; j < n; j++) s -= A[i][j] * x[j];
                x[i] = s / A[i][i];
            }
            return x;
        }

        function sampleDS(f, n, sigma, seed) {
            const r = rng(seed || Math.floor(Math.random() * 1e9));
            const pts = [];
            for (let i = 0; i < n; i++) {
                const x = -1 + 2 * r.next();
                pts.push({ x, y: f(x) + (sigma > 0 ? r.gauss() * sigma * Math.sqrt(12) : 0) });
            }
            pts.sort((a, b) => a.x - b.x);
            return pts;
        }

        function mse(yTrue, yPred) {
            let s = 0;
            for (let i = 0; i < yTrue.length; i++) s += (yTrue[i] - yPred[i]) ** 2;
            return s / yTrue.length;
        }

        function computeEout(f, predict, nPoints = 500) {
            const xs = linspace(-1, 1, nPoints);
            let s = 0;
            for (const x of xs) s += (predict(x) - f(x)) ** 2;
            return s / xs.length;
        }

        function linspace(a, b, n) {
            const out = [];
            for (let i = 0; i < n; i++) out.push(a + (b - a) * i / (n - 1));
            return out;
        }

        function range(a, b, step) {
            const out = [];
            for (let v = a; v <= b + 1e-9; v += step) out.push(v);
            return out;
        }

        // ===================== UI State =====================
        let mainTab = 'gen';
        let genTab = 'eio';
        let lcTab = 'theory';

        function setMainTab(tab) {
            mainTab = tab;
            document.getElementById('main-tab-gen').classList.toggle('active', tab === 'gen');
            document.getElementById('main-tab-lc').classList.toggle('active', tab === 'lc');
            document.getElementById('gen-section').classList.toggle('hidden', tab !== 'gen');
            document.getElementById('lc-section').classList.toggle('hidden', tab !== 'lc');
            if (tab === 'gen') renderGen();
            else renderLc();
        }

        function setGenTab(tab) {
            genTab = tab;
            document.querySelectorAll('[data-gen]').forEach(b => b.classList.toggle('active', b.dataset.gen === tab));
            document.getElementById('gen-view-pair').classList.toggle('hidden', tab === 'cmp');
            document.getElementById('gen-view-grid').classList.toggle('hidden', tab !== 'cmp');
            document.getElementById('gen-cmp-table').classList.toggle('hidden', tab !== 'cmp');
            document.getElementById('gen-model-control').classList.toggle('hidden', tab === 'cmp');
            document.getElementById('gen-ensemble-controls').classList.toggle('hidden', tab === 'eio' || tab === 'cmp');
            document.getElementById('gen-resample').classList.toggle('hidden', tab !== 'eio' && tab !== 'cmp');
            if (tab !== 'avg' && tab !== 'bias' && tab !== 'var') resetGenAccum();
            renderGen();
        }

        function setLcTab(tab) {
            lcTab = tab;
            document.querySelectorAll('[data-lc]').forEach(b => b.classList.toggle('active', b.dataset.lc === tab));
            document.getElementById('lc-model-control').classList.toggle('hidden', tab === 'compare');
            document.getElementById('lc-compare-controls').classList.toggle('hidden', tab !== 'compare');
            document.getElementById('lc-run-controls').classList.toggle('hidden', tab !== 'practice');
            resetLcAccum();
            renderLc();
        }

        // ===================== Plot Helpers =====================
        const BASE_LAYOUT = {
            margin: { t: 30, b: 40, l: 50, r: 20 },
            paper_bgcolor: '#fff',
            plot_bgcolor: '#fff',
            xaxis: { title: 'x', range: [-1, 1], gridcolor: '#eef1f5', zerolinecolor: '#eef1f5' },
            yaxis: { title: 'y', range: [-2, 2], gridcolor: '#eef1f5', zerolinecolor: '#eef1f5' },
            showlegend: false,
        };

        const LC_LAYOUT = {
            margin: { t: 30, b: 40, l: 50, r: 20 },
            paper_bgcolor: '#fff',
            plot_bgcolor: '#fff',
            xaxis: { title: 'n (number of samples)', type: 'log', gridcolor: '#eef1f5' },
            yaxis: { title: 'Expected Error', gridcolor: '#eef1f5' },
            showlegend: true,
            legend: { x: 1, y: 1 },
        };

        function curveTrace(fn, xs, opts) {
            return {
                x: xs, y: xs.map(fn),
                mode: 'lines',
                line: { color: opts.color || '#333', width: opts.width || 2, dash: opts.dash || 'solid' },
                name: opts.name || '',
            };
        }

        function pointsTrace(pts, opts) {
            return {
                x: pts.map(p => p.x), y: pts.map(p => p.y),
                mode: 'markers',
                marker: { color: opts.color || COLORS.data, size: opts.size || 8 },
                name: opts.name || 'data',
            };
        }

        function bandTrace(xs, lower, upper, color) {
            return {
                x: xs.concat(xs.slice().reverse()),
                y: upper.concat(lower.slice().reverse()),
                fill: 'toself',
                fillcolor: color,
                line: { color: 'transparent' },
                name: '±1 std',
                hoverinfo: 'skip',
            };
        }

        function plot(id, traces, layout) {
            const el = document.getElementById(id);
            if (!el) return;
            Plotly.newPlot(id, traces, { ...BASE_LAYOUT, ...layout }, { responsive: true });
        }

        // ===================== Generalization Playground =====================
        let genAccum = { count: 0, sum: [], sum2: [], recent: [] };
        const GRID_X = linspace(-1, 1, 100);
        let genSeed = 1;

        function resetGenAccum() {
            genAccum = { count: 0, sum: new Array(GRID_X.length).fill(0), sum2: new Array(GRID_X.length).fill(0), recent: [] };
        }

        function addGenDatasets(k) {
            const f = TARGETS[document.getElementById('gen-target').value];
            const M = +document.getElementById('gen-model').value;
            const n = +document.getElementById('gen-n').value;
            const sigma = +document.getElementById('gen-sigma').value / 100;

            for (let j = 0; j < k; j++) {
                const pts = sampleDS(f, n, sigma, genSeed * 100000 + genAccum.count);
                if (pts.length < M + 1) continue;
                const m = polyFit(pts, M);
                for (let i = 0; i < GRID_X.length; i++) {
                    const yp = m.predict(GRID_X[i]);
                    genAccum.sum[i] += yp;
                    genAccum.sum2[i] += yp * yp;
                }
                genAccum.recent.push(m.predict);
                genAccum.count++;
            }
            if (genAccum.recent.length > 40) genAccum.recent = genAccum.recent.slice(-40);
        }

        function genAccumStats(f) {
            const mean = [], std = [], bias2 = [], varPt = [];
            for (let i = 0; i < GRID_X.length; i++) {
                const mu = genAccum.count ? genAccum.sum[i] / genAccum.count : 0;
                const vv = genAccum.count ? Math.max(0, genAccum.sum2[i] / genAccum.count - mu * mu) : 0;
                mean.push(mu);
                std.push(Math.sqrt(vv));
                bias2.push((mu - f(GRID_X[i])) ** 2);
                varPt.push(vv);
            }
            const avgBias2 = bias2.reduce((a, b) => a + b, 0) / GRID_X.length;
            const avgVar = varPt.reduce((a, b) => a + b, 0) / GRID_X.length;
            return { mean, std, bias2, varPt, avgBias2, avgVar };
        }

        function renderGenEio() {
            const f = TARGETS[document.getElementById('gen-target').value];
            const M = +document.getElementById('gen-model').value;
            const n = +document.getElementById('gen-n').value;
            const sigma = +document.getElementById('gen-sigma').value / 100;
            const pts = sampleDS(f, n, sigma, genSeed);
            const m = polyFit(pts, M);

            const xs = linspace(-1, 1, 200);
            const trainPred = pts.map(p => m.predict(p.x));
            const ein = mse(pts.map(p => p.y), trainPred);
            const eout = computeEout(f, m.predict, 500);

            // Left: in-sample
            const leftTraces = [
                curveTrace(f, xs, { color: COLORS.target, width: 2.5, name: 'target' }),
                curveTrace(m.predict, xs, { color: COLORS.fit, width: 3, name: 'g(x)' }),
                pointsTrace(pts, { color: COLORS.data, size: 10, name: 'data' }),
            ];
            // error squares as vertical lines for simplicity
            for (const p of pts) {

                    showlegend: false, hoverinfo: 'skip',
                });
            }
            plot('gen-plot-a', leftTraces, { title: 'In-sample: fit on n points' });

            // Right: out-of-sample
            const upper = xs.map(x => Math.max(m.predict(x), f(x)));
            const lower = xs.map(x => Math.min(m.predict(x), f(x)));
            const rightTraces = [
                bandTrace(xs, lower, upper, 'rgba(224,122,95,0.28)'),

            document.getElementById('gen-info').innerHTML =
                `$E_{\\text{in}} = ${ein.toFixed(3)}$ &nbsp;|&nbsp; $E_{\\text{out}} = ${eout.toFixed(3)}$`;
            renderMath(document.getElementById('gen-info'));
        }

        function renderGenCmp() {
            const f = TARGETS[document.getElementById('gen-target').value];
            const n = +document.getElementById('gen-n').value;
            const sigma = +document.getElementById('gen-sigma').value / 100;
            const xs = linspace(-1, 1, 150);

            const rows = [];
            for (let M = 0; M <= 3; M++) {
                const s = new Array(xs.length).fill(0), s2 = new Array(xs.length).fill(0);
                let sumEin = 0;
                const fits = [];
                const D = 3000;
                for (let d = 0; d < D; d++) {
                    const pts = sampleDS(f, n, sigma, 600000 + M * 100000 + d);
                    if (pts.length < M + 1) continue;
                    const m = polyFit(pts, M);
                    const pred = pts.map(p => m.predict(p.x));
                    sumEin += mse(pts.map(p => p.y), pred);
                    for (let i = 0; i < xs.length; i++) {
                        const yp = m.predict(xs[i]);
                        s[i] += yp; s2[i] += yp * yp;
                    }
                    if (d < 20) fits.push(m.predict);
                }
                const mean = s.map(v => v / D);
                let b = 0, v = 0;
                for (let i = 0; i < xs.length; i++) {
                    const mu = mean[i], vv = Math.max(0, s2[i] / D - mu * mu);
                    b += (mu - f(xs[i])) ** 2;
                    v += vv;
                }
                b /= xs.length; v /= xs.length;
                const eout = b + v + sigma * sigma;
                rows.push({ M, name: MODEL_NAMES[M], bias2: b, var: v, ein: sumEin / D, eout });

                // plot
                const traces = [];
                for (const fn of fits) traces.push(curveTrace(fn, xs, { color: 'rgba(108,116,130,0.25)', width: 1 }));
                traces.push(curveTrace(f, xs, { color: COLORS.target, width: 2 }));
                traces.push(curveTrace(x => mean[Math.round((x + 1) / 2 * (xs.length - 1))] || 0, xs, { color: COLORS.avg, width: 2.5 }));
                plot(`gen-cmp-${M}`, traces, { title: MODEL_NAMES[M], yaxis: { range: [-2, 2] } });
            }

            const best = Math.min(...rows.map(r => r.eout));
            const tbody = document.getElementById('gen-cmp-body');
            tbody.innerHTML = rows.map(r => {
                const hl = Math.abs(r.eout - best) < 1e-9;
                return `<tr class="${hl ? 'bg-emerald-50 font-semibold' : ''}">
                    <td class="px-4 py-2">${r.name}</td>
                    <td class="px-4 py-2 text-right font-mono">${r.bias2.toFixed(3)}</td>
                    <td class="px-4 py-2 text-right font-mono">${r.var.toFixed(3)}</td>
                    <td class="px-4 py-2 text-right font-mono">${r.ein.toFixed(3)}</td>
                    <td class="px-4 py-2 text-right font-mono ${hl ? 'text-emerald-700' : ''}">${r.eout.toFixed(3)}</td>
                </tr>`;
            }).join('');

            document.getElementById('gen-info').textContent = `Lowest E_out highlighted — often not the most complex model.`;
        }

        function renderGen() {
            if (mainTab !== 'gen') return;
            switch (genTab) {
                case 'eio': renderGenEio(); break;
                case 'avg': renderGenAvg(); break;
                case 'bias': renderGenBias(); break;
                case 'var': renderGenVar(); break;
                case 'cmp': renderGenCmp(); break;
            }
        }

        // ===================== Learning Curve Playground =====================
        const LC_N = [2, 3, 4, 5, 7, 10, 15, 20, 30, 50, 100];
        let lcSeed = 1;
        let lcAccum = { count: 0, sum: [], sum2: [], sumEin: [] };
        let lcTimer = null;
        let lcPlaying = false;

        function resetLcAccum() {
            lcAccum = { count: 0, sum: LC_N.map(() => []), sum2: LC_N.map(() => []), sumEin: LC_N.map(() => 0) };
            lcPlaying = false;
            if (lcTimer) { clearTimeout(lcTimer); lcTimer = null; }
            document.getElementById('lc-play').textContent = 'Play';
        }

        function curveFor(M, T) {
            const f = TARGETS[document.getElementById('lc-target').value];
            const sigma = +document.getElementById('lc-sigma').value / 100;
            const out = [];
            for (const nn of LC_N) {
                if (nn < M + 1) { out.push({ N: nn, ein: null, eout: null, bias2: null }); continue; }
                const s = [], s2 = [];
                let sumEin = 0;
                for (let t = 0; t < T; t++) {
                    const pts = sampleDS(f, nn, sigma, lcSeed * 1000000 + nn * 7919 + t * 101);
                    const m = polyFit(pts, M);
                    const pred = pts.map(p => m.predict(p.x));
                    sumEin += mse(pts.map(p => p.y), pred);
                    const xs = linspace(-1, 1, 100);
                    for (let i = 0; i < xs.length; i++) {
                        const yp = m.predict(xs[i]);
                        if (!s[i]) { s[i] = 0; s2[i] = 0; }
                        s[i] += yp; s2[i] += yp * yp;
                    }
                }
                let b = 0, v = 0;
                const xs = linspace(-1, 1, 100);
                for (let i = 0; i < xs.length; i++) {
                    const mu = s[i] / T, vv = Math.max(0, s2[i] / T - mu * mu);
                    b += (mu - f(xs[i])) ** 2;
                    v += vv;
                }
                b /= xs.length; v /= xs.length;
                out.push({ N: nn, ein: sumEin / T, eout: b + v + sigma * sigma, bias2: b });
            }
            return out;
        }

        function renderLcData(f, M, n, sigma) {
            const xs = linspace(-1, 1, 200);
            const traces = [curveTrace(f, xs, { color: COLORS.target, width: 2.5, name: 'target' })];

            if (lcTab === 'compare') {
                const MA = +document.getElementById('lc-mA').value;
                const MB = +document.getElementById('lc-mB').value;
                const pts = sampleDS(f, n, sigma, lcSeed * 1000000 + n * 7919 + 9);
                const mA = polyFit(pts, MA);
                const mB = polyFit(pts, MB);
                traces.push(curveTrace(mA.predict, xs, { color: COLORS.simple, width: 2.5, name: 'model A' }));
                traces.push(curveTrace(mB.predict, xs, { color: COLORS.complex, width: 2.5, name: 'model B' }));
                traces.push(pointsTrace(pts, { color: COLORS.data, size: 9, name: 'data' }));
            } else if (lcTab === 'theory') {
                const K = 16, gs = new Array(100).fill(0);
                for (let t = 0; t < K; t++) {
                    const pts = sampleDS(f, n, sigma, lcSeed * 1000000 + n * 7919 + t + 9);
                    const m = polyFit(pts, M);
                    const xs2 = linspace(-1, 1, 100);
                    for (let i = 0; i < 100; i++) gs[i] += m.predict(xs2[i]);
                }
                const meanFn = x => {
                    const xs2 = linspace(-1, 1, 100);
                    const idx = Math.round((x + 1) / 2 * 99);
                    return gs[idx] / K;
                };
                traces.push(curveTrace(meanFn, xs, { color: COLORS.fit, width: 3, name: 'average fit' }));
            } else {
                const pts = sampleDS(f, n, sigma, lcSeed * 1000000 + n * 7919 + 9);
                const m = polyFit(pts, M);
                traces.push(curveTrace(m.predict, xs, { color: COLORS.fit, width: 2.5, name: 'g(x)' }));
                traces.push(pointsTrace(pts, { color: COLORS.data, size: 9, name: 'data' }));
            }
            plot('lc-plot-data', traces, { title: 'Data + fit at current n' });
        }

        function renderLcCurve() {
            const f = TARGETS[document.getElementById('lc-target').value];
            const sigma = +document.getElementById('lc-sigma').value / 100;
            const nsel = +document.getElementById('lc-n').value;

            let refA, refB, M;
            if (lcTab === 'compare') {
                const MA = +document.getElementById('lc-mA').value;
                const MB = +document.getElementById('lc-mB').value;
                refA = curveFor(MA, 1500);
                refB = curveFor(MB, 1500);
                M = MA;
            } else {
                M = +document.getElementById('lc-model').value;
                refA = curveFor(M, 1500);
                refB = [];
            }

            // Determine ymax
            let ymax = 1.2;
            const allVals = [...refA, ...refB].flatMap(r => [r.ein, r.eout]).filter(v => v != null && isFinite(v));
            if (allVals.length) ymax = Math.max(0.1, Math.max(...allVals) * 1.15);

            const traces = [];
            const layout = { ...LC_LAYOUT, yaxis: { title: 'Expected Error', range: [0, ymax] } };

            // vertical line at selected n
            traces.push({
                x: [nsel, nsel], y: [0, ymax],
                mode: 'lines', line: { color: '#9aa3b2', width: 1.3, dash: 'dash' },
                name: 'current n', showlegend: false,
            });

            if (lcTab === 'compare') {
                const MA = +document.getElementById('lc-mA').value;
                const MB = +document.getElementById('lc-mB').value;
                const nameA = MODEL_NAMES[MA], nameB = MODEL_NAMES[MB];
                traces.push({
                    x: refA.map(r => r.N), y: refA.map(r => r.eout),
                    mode: 'lines', line: { color: COLORS.simple, width: 2.5 }, name: `Eout ${nameA}`,
                });
                traces.push({
                    x: refB.map(r => r.N), y: refB.map(r => r.eout),
                    mode: 'lines', line: { color: COLORS.complex, width: 2.5 }, name: `Eout ${nameB}`,
                });
                // highlight current n
                const aPt = refA.find(r => r.N === nsel) || refA[refA.length - 1];
                const bPt = refB.find(r => r.N === nsel) || refB[refB.length - 1];
                if (aPt && aPt.eout != null) traces.push({ x: [nsel], y: [aPt.eout], mode: 'markers', marker: { color: COLORS.simple, size: 10 }, name: `${nameA} @ n`, showlegend: false });
                if (bPt && bPt.eout != null) traces.push({ x: [nsel], y: [bPt.eout], mode: 'markers', marker: { color: COLORS.complex, size: 10 }, name: `${nameB} @ n`, showlegend: false });

                document.getElementById('lc-info').innerHTML =
                    `$E_{\\text{out}}^{\\text{${nameA}}} = ${aPt.eout.toFixed(3)}$ &nbsp;|&nbsp; $E_{\\text{out}}^{\\text{${nameB}}} = ${bPt.eout.toFixed(3)}$`;
            } else {
                const nv = sigma * sigma;
                const floor = nv + (refA[refA.length - 1].bias2 || 0);

                // asymptote
                if (floor < ymax) {
                    traces.push({
                        x: [LC_N[0], LC_N[LC_N.length - 1]], y: [floor, floor],
                        mode: 'lines', line: { color: COLORS.target, width: 1.4, dash: 'dash' }, name: 'bias² + σ²', showlegend: true,
                    });
                }

                // measured curve
                let run = refA;
                if (lcTab === 'practice' && lcAccum.count > 0) {
                    run = LC_N.map((nn, j) => {
                        if (nn < M + 1) return { N: nn, ein: null, eout: null };
                        const s = lcAccum.sum[j], s2 = lcAccum.sum2[j];
                        let b = 0, v = 0;
                        for (let i = 0; i < s.length; i++) {
                            const mu = s[i] / lcAccum.count, vv = Math.max(0, s2[i] / lcAccum.count - mu * mu);
                            const xs = linspace(-1, 1, 100);
                            b += (mu - f(xs[i])) ** 2; v += vv;
                        }
                        b /= 100; v /= 100;
                        return { N: nn, ein: lcAccum.sumEin[j] / lcAccum.count, eout: b + v + nv };
                    });
                }

                traces.push({
                    x: run.map(r => r.N), y: run.map(r => r.ein),
                    mode: 'lines+markers', line: { color: COLORS.ein, width: 2, dash: 'dash' }, marker: { size: 6 }, name: 'Ein',
                });
                traces.push({
                    x: run.map(r => r.N), y: run.map(r => r.eout),
                    mode: 'lines+markers', line: { color: COLORS.eout, width: 2 }, marker: { size: 6, symbol: 'square' }, name: 'Eout',
                });

                const th = refA.find(r => r.N === nsel) || refA[refA.length - 1];
                const pr = run.find(r => r.N === nsel) || run[run.length - 1];
                const b = Math.max(0, th.bias2 || 0);
                const vv = Math.max(0, (th.eout || 0) - b - nv);
                document.getElementById('lc-info').innerHTML =
                    `$E_{\\text{out}} = \\text{bias}^2 + \\text{variance} + \\sigma^2 = ${b.toFixed(3)} + ${vv.toFixed(3)} + ${nv.toFixed(3)} = ${(th.eout || 0).toFixed(3)}$` +
                    (lcTab === 'practice' ? `<br>runs so far: ${lcAccum.count}` : '');
            }

            plot('lc-plot-curve', traces, layout);
        }

        function renderLc() {
            if (mainTab !== 'lc') return;
            const f = TARGETS[document.getElementById('lc-target').value];
            const M = +document.getElementById('lc-model').value;
            const n = +document.getElementById('lc-n').value;
            const sigma = +document.getElementById('lc-sigma').value / 100;
            renderLcData(f, M, n, sigma);
            renderLcCurve();
            renderMath(document.getElementById('lc-info'));
        }

        // ===================== Interpolation helper =====================
        function interp(x, xs, ys) {
            const t = (x - xs[0]) / (xs[xs.length - 1] - xs[0]) * (xs.length - 1);
            let i = Math.floor(t);
            if (i < 0) i = 0;
            if (i >= xs.length - 1) i = xs.length - 2;
            const u = t - i;
            return ys[i] * (1 - u) + ys[i + 1] * u;
        }

        document.getElementById('gen-n').addEventListener('input', e => {

        function stopLcPlay() {
            lcPlaying = false;
            if (lcTimer) { clearTimeout(lcTimer); lcTimer = null; }
            document.getElementById('lc-play').textContent = 'Play';
        }
        function lcPlayTick() {
            if (!lcPlaying) return;
            const f = TARGETS[document.getElementById('lc-target').value];
            const M = +document.getElementById('lc-model').value;
            const sigma = +document.getElementById('lc-sigma').value / 100;
            const batch = Math.max(1, Math.floor(lcAccum.count / 10) + 1);
            for (let j = 0; j < LC_N.length; j++) {
                const nn = LC_N[j];
                if (nn < M + 1) continue;
                const s = lcAccum.sum[j], s2 = lcAccum.sum2[j];
                let eSum = 0;
                for (let t = 0; t < batch; t++) {
                    const pts = sampleDS(f, nn, sigma, lcSeed * 1000000 + nn * 7919 + (lcAccum.count + t) * 101 + 555);
                    const m = polyFit(pts, M);
                    const pred = pts.map(p => m.predict(p.x));
                    eSum += mse(pts.map(p => p.y), pred);
                    const xs = linspace(-1, 1, 100);
                    for (let i = 0; i < 100; i++) {
                        const yp = m.predict(xs[i]);
                        if (!s[i]) { s[i] = 0; s2[i] = 0; }
                        s[i] += yp; s2[i] += yp * yp;
                    }
                }
                lcAccum.sumEin[j] += eSum;
            }
            lcAccum.count += batch;
            renderLc();
            lcTimer = setTimeout(lcPlayTick, 80);
        }

        window.addEventListener('resize', () => {
            if (mainTab === 'gen') renderGen();
            else renderLc();
        });

        // ===================== Init =====================
        window.addEventListener('load', () => {
            resetGenAccum();
            resetLcAccum();
            renderGen();
            renderMathInElement(document.body, KATEX_OPTS);
        });
    </script>
</body>
</html>
